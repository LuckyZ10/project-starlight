# Starlight Nginx Configuration
# Reverse proxy for Starlight application with SSL support

upstream starlight_backend {
    server backend:8000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/starlight.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/starlight.example.com/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/starlight-access.log;
    error_log /var/log/nginx/starlight-error.log;

    # Client Max Body Size
    client_max_body_size 20M;

    # Proxy Settings
    location / {
        proxy_pass http://starlight_backend;
        proxy_http_version 1.1;

        # Standard Proxy Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout Settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # WebSocket Support
        proxy_set_header Connection $connection_upgrade;
    }

    # Health Check Endpoint
    location /health {
        proxy_pass http://starlight_backend/api/health;
        access_log off;
    }

    # API Routes
    location /api/ {
        proxy_pass http://starlight_backend/api/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# WebSocket Upgrade Rule
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
