<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>星光学习机</title>
<link rel="manifest" href="/manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f7f8;--surface:#fff;--primary:#d97706;--primary-light:#fef3c7;
  --text:#1a1a2e;--text2:#6b7280;--border:#e5e7eb;
  --assistant-bg:#f0f0f0;--user-bg:#d97706;--user-text:#fff;
  --pass:#10b981;--fail:#ef4444;--radius:18px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column}
/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10}
.header-logo{font-size:22px}
.header-title{font-size:17px;font-weight:600}
.header-sub{font-size:12px;color:var(--text2)}
.header-actions{margin-left:auto;display:flex;gap:8px}
.header-btn{background:none;border:1px solid var(--border);border-radius:10px;padding:6px 12px;font-size:13px;cursor:pointer;color:var(--text2);transition:all .2s}
.header-btn:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}
/* Sidebar */
.sidebar{position:fixed;top:0;left:-320px;width:300px;height:100%;background:var(--surface);border-right:1px solid var(--border);z-index:100;transition:left .3s ease;padding:20px;overflow-y:auto}
.sidebar.open{left:0}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99;display:none}
.sidebar-overlay.open{display:block}
.sidebar h3{font-size:14px;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.sidebar-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2)}
.stat-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.stat-val{font-weight:600;color:var(--primary)}
/* Chat area */
.chat{flex:1;overflow-y:auto;padding:20px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
/* Messages */
.msg{display:flex;gap:10px;margin-bottom:16px;max-width:740px;margin-left:auto;margin-right:auto;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg-user .msg-avatar{background:var(--primary-light)}
.msg-assistant .msg-avatar{background:var(--assistant-bg)}
.msg-bubble{padding:12px 16px;border-radius:var(--radius);line-height:1.6;font-size:15px;max-width:calc(100% - 48px);word-wrap:break-word}
.msg-user{flex-direction:row-reverse}
.msg-user .msg-bubble{background:var(--user-bg);color:var(--user-text);border-bottom-right-radius:4px}
.msg-assistant .msg-bubble{background:var(--assistant-bg);border-bottom-left-radius:4px}
.msg-system .msg-bubble{background:var(--primary-light);color:#92400e;font-size:13px;text-align:center;max-width:500px;margin:0 auto;border-radius:12px}
/* Question options */
.options{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.opt-btn{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:12px 16px;text-align:left;cursor:pointer;font-size:14px;transition:all .2s;display:flex;align-items:center;gap:10px}
.opt-btn:hover{border-color:var(--primary);background:var(--primary-light)}
.opt-btn.selected{border-color:var(--primary);background:var(--primary-light)}
.opt-label{width:28px;height:28px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.opt-btn.selected .opt-label{background:var(--primary);color:#fff}
.multi-hint{font-size:12px;color:var(--text2);margin-top:4px}
.multi-actions{display:flex;gap:8px;margin-top:8px}
.multi-submit{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer}
.multi-submit:hover{opacity:.9}
/* Typing */
.typing{display:flex;gap:4px;padding:12px 16px;align-items:center}
.typing span{width:8px;height:8px;background:var(--text2);border-radius:50%;animation:blink 1.4s infinite both}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
/* Verdict badges */
.verdict{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-top:6px}
.verdict-pass{background:#d1fae5;color:#065f46}
.verdict-fail{background:#fee2e2;color:#991b1b}
/* Input bar */
.input-bar{background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;flex-shrink:0}
.input-wrap{max-width:740px;margin:0 auto;display:flex;gap:10px;align-items:end}
.input-field{flex:1;border:2px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-size:15px;outline:none;resize:none;min-height:44px;max-height:120px;font-family:inherit;transition:border-color .2s;line-height:1.4}
.input-field:focus{border-color:var(--primary)}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.send-btn:hover{transform:scale(1.05)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.send-btn svg{width:20px;height:20px}
/* Cartridge cards (browse) */
.cart-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:12px}
.cart-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s}
.cart-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.cart-card h4{font-size:15px;margin-bottom:4px}
.cart-card p{font-size:13px;color:var(--text2)}
/* Welcome screen */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px 20px}
.welcome-icon{font-size:64px;margin-bottom:16px}
.welcome h2{font-size:24px;font-weight:700;margin-bottom:8px}
.welcome p{color:var(--text2);font-size:15px;max-width:400px;margin-bottom:24px}
.welcome-btn{background:var(--primary);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s}
.welcome-btn:hover{transform:scale(1.03);box-shadow:0 4px 16px rgba(217,119,6,.3)}
/* Markdown-ish rendering */
.md-bold{font-weight:700}
.md-code{background:#1e1e2e;color:#cdd6f4;padding:2px 6px;border-radius:4px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:13px}
.md-block{background:#1e1e2e;color:#cdd6f4;padding:12px 16px;border-radius:8px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:13px;margin:8px 0;overflow-x:auto;white-space:pre-wrap}
/* Responsive */
@media(max-width:640px){
  .msg{max-width:100%}
  .input-wrap{max-width:100%}
  .header{padding:10px 14px}
  .chat{padding:14px}
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
  <h3>📊 学习统计</h3>
  <div id="statsContent"><div class="stat-row"><span>加载中...</span></div></div>
  <div style="margin-top:24px">
    <h3>💡 快捷操作</h3>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
      <button class="header-btn" style="text-align:left" onclick="sendAction('browse');toggleSidebar()">📚 浏览卡带</button>
      <button class="header-btn" style="text-align:left" onclick="sendAction('progress');toggleSidebar()">🗺️ 学习进度</button>
      <button class="header-btn" style="text-align:left" onclick="sendAction('review');toggleSidebar()">📋 复习内容</button>
    </div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-logo">🌟</div>
  <div>
    <div class="header-title">星光学习机</div>
    <div class="header-sub" id="statusText">连接中...</div>
  </div>
  <div class="header-actions">
    <button class="header-btn" onclick="toggleSidebar()">📊</button>
    <button class="header-btn" onclick="sendAction('browse')">📚 卡带</button>
  </div>
</div>

<!-- Chat -->
<div class="chat" id="chat">
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-icon">🌟</div>
    <h2>星光学习机</h2>
    <p>你的个性化学习伙伴。选择一个卡带，开始互动式学习之旅。</p>
    <button class="welcome-btn" onclick="sendAction('browse')">开始学习 →</button>
  </div>
</div>

<!-- Input -->
<div class="input-bar">
  <div class="input-wrap">
    <textarea class="input-field" id="inputField" placeholder="输入你的回答..." rows="1"
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('inputField');
const sendBtn = document.getElementById('sendBtn');
const statusText = document.getElementById('statusText');
const welcomeScreen = document.getElementById('welcomeScreen');
let ws = null;
let reconnectDelay = 1000;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    statusText.textContent = '在线';
    statusText.style.color = '#10b981';
    reconnectDelay = 1000;
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleServerMessage(msg);
  };

  ws.onclose = () => {
    statusText.textContent = '断开连接';
    statusText.style.color = '#ef4444';
    setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      connect();
    }, reconnectDelay);
  };

  ws.onerror = () => {};
}

function handleServerMessage(msg) {
  removeTyping();

  switch(msg.type) {
    case 'welcome':
      statusText.textContent = '在线';
      statusText.style.color = '#10b981';
      break;
    case 'heartbeat':
      // Keepalive, ignore
      break;
    case 'browse':
      hideWelcome();
      if (msg.cartridges && msg.cartridges.length > 0) {
        let cartHtml = '<div style="margin-bottom:8px">📚 选择一个卡带开始学习：</div>';
        cartHtml += '<div class="cart-grid">';
        msg.cartridges.forEach(c => {
          cartHtml += `<div class="cart-card" onclick="startCartridge('${escAttr(c.id)}')">
            <h4>${escHtml(c.title)}</h4>
            <p>${c.nodes} 个知识点</p>
          </div>`;
        });
        cartHtml += '</div>';
        addAssistantMsg(cartHtml, { raw: true });
      } else {
        addAssistantMsg('暂无可用卡带');
      }
      break;
    case 'progress':
    case 'stats':
    case 'review':
      addAssistantMsg(msg.text);
      if (msg.type === 'stats') updateStats(msg.text);
      break;
    case 'typing':
      showTyping();
      break;
    case 'message':
      let verdictHtml = '';
      if (msg.verdict === 'PASS') verdictHtml = '<div class="verdict verdict-pass">✅ 通过</div>';
      else if (msg.verdict === 'FAIL') verdictHtml = '<div class="verdict verdict-fail">❌ 未通过</div>';

      let optionsHtml = '';
      if (msg.options && msg.options.length > 0) {
        if (msg.is_multi) {
          optionsHtml = '<div class="multi-hint">☑️ 多选题 — 可选多个</div>';
          optionsHtml += '<div class="options" data-multi="true">';
          msg.options.forEach(([label, text]) => {
            optionsHtml += `<button class="opt-btn" data-label="${label}" onclick="toggleMulti(this)">
              <span class="opt-label">${label}</span><span>${escHtml(text)}</span></button>`;
          });
          optionsHtml += '</div>';
          optionsHtml += '<div class="multi-actions"><button class="multi-submit" onclick="submitMulti()">✅ 确认提交</button></div>';
        } else {
          optionsHtml += '<div class="options">';
          msg.options.forEach(([label, text]) => {
            optionsHtml += `<button class="opt-btn" onclick="selectOption('${escAttr(label)}','${escAttr(text)}')">
              <span class="opt-label">${label}</span><span>${escHtml(text)}</span></button>`;
          });
          optionsHtml += '</div>';
        }
      }

      addAssistantMsg(msg.text + verdictHtml + optionsHtml, { raw: true });
      // Update status based on state
      if (msg.state === 'learning') statusText.textContent = '学习中...';
      else if (msg.state === 'completed') statusText.textContent = '🎉 通关！';
      else statusText.textContent = '在线';
      break;
    case 'error':
      addSystemMsg('⚠️ ' + msg.text);
      break;
  }
  scrollToBottom();
}

function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addSystemMsg('⚠️ 连接断开了，正在重连...');
    return;
  }
  addUserMsg(text);
  ws.send(JSON.stringify({ action: 'message', text }));
  input.value = '';
  input.style.height = 'auto';
}

function sendAction(action, data = {}) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addSystemMsg('⚠️ 连接断开了，正在重连...');
    return;
  }
  const msg = { action, ...data };
  ws.send(JSON.stringify(msg));
}

function selectOption(label, text) {
  addUserMsg(`${label}. ${text}`);
  sendAction('message', { text: label });
}

function startCartridge(cartId) {
  addUserMsg(`开始学习：${cartId}`);
  sendAction('start', { cartridge_id: cartId });
}

// Multi-select
let multiSelected = new Set();
function toggleMulti(btn) {
  const label = btn.dataset.label;
  if (multiSelected.has(label)) {
    multiSelected.delete(label);
    btn.classList.remove('selected');
  } else {
    multiSelected.add(label);
    btn.classList.add('selected');
  }
}

function submitMulti() {
  if (multiSelected.size === 0) return;
  const labels = Array.from(multiSelected).sort();
  const answer = labels.join('、');
  addUserMsg(answer);
  sendAction('message', { text: answer });
  multiSelected.clear();
  // Remove options from DOM
  document.querySelectorAll('.options, .multi-actions, .multi-hint').forEach(el => el.remove());
}

// UI helpers
function hideWelcome() {
  if (welcomeScreen) welcomeScreen.style.display = 'none';
}

function addUserMsg(text) {
  hideWelcome();
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  div.innerHTML = `<div class="msg-avatar">👤</div><div class="msg-bubble">${escHtml(text)}</div>`;
  chat.appendChild(div);
  scrollToBottom();
}

function addAssistantMsg(html, opts = {}) {
  const div = document.createElement('div');
  div.className = 'msg msg-assistant';
  const content = opts.raw ? html : renderMd(html);
  div.innerHTML = `<div class="msg-avatar">🌟</div><div class="msg-bubble">${content}</div>`;
  chat.appendChild(div);
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.innerHTML = `<div class="msg-bubble">${text}</div>`;
  chat.appendChild(div);
}

function showTyping() {
  removeTyping();
  const div = document.createElement('div');
  div.className = 'msg msg-assistant';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-avatar">🌟</div><div class="msg-bubble typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function scrollToBottom() {
  requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function updateStats(text) {
  const container = document.getElementById('statsContent');
  const lines = text.split('\n').filter(l => l.trim());
  let html = '';
  lines.forEach(line => {
    const match = line.match(/^(⚡|📚|📈|🎯|🧠|🔥|📊)(.+)/);
    if (match) {
      const parts = match[2].split(':');
      if (parts.length === 2) {
        html += `<div class="stat-row"><span>${match[1]} ${parts[0].trim()}</span><span class="stat-val">${parts[1].trim()}</span></div>`;
      }
    }
  });
  if (html) container.innerHTML = html;
}

// Simple markdown renderer
function renderMd(text) {
  return escHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<span class="md-bold">$1</span>')
    .replace(/`([^`]+)`/g, '<span class="md-code">$1</span>')
    .replace(/```([\s\S]+?)```/g, '<div class="md-block">$1</div>')
    .replace(/\n/g, '<br>');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// Connect on load
connect();

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
